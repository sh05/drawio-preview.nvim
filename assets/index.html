<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>drawio-preview.nvim</title>
<style>
  html, body { margin: 0; height: 100%; background: #1e1e1e; }
  iframe { width: 100%; height: 100%; border: 0; display: block; }
  #status {
    position: fixed; left: 8px; bottom: 8px; z-index: 10;
    font: 12px/1.4 system-ui, sans-serif; color: #bbb;
    background: rgba(30,30,30,.85); border-radius: 4px; padding: 2px 8px;
    pointer-events: none; transition: opacity .4s; opacity: 0;
  }
</style>
</head>
<body>
<iframe id="editor"
        src="{{DRAWIO_URL}}/?embed=1&proto=json&chrome=0&spin=1"></iframe>
<div id="status"></div>
<script>
(function () {
  'use strict';
  var frame = document.getElementById('editor');
  // Pin messaging to the configured draw.io origin: never send the
  // diagram to (or accept events from) anything else the iframe might
  // get navigated to.
  var drawioOrigin = new URL(frame.src).origin;
  // Per-session auth token, handed to us in the URL by :DrawioPreview;
  // the server rejects any request that does not present it.
  var token = new URLSearchParams(location.search).get('t') || '';
  var auth = '?t=' + encodeURIComponent(token);
  var statusEl = document.getElementById('status');
  var ready = false;        // draw.io sent {event:'init'}
  var lastXml = null;       // most recent XML from Neovim
  var pendingExports = [];  // export requests queued before init

  function flash(text, sticky) {
    statusEl.textContent = text;
    statusEl.style.opacity = '1';
    clearTimeout(flash._t);
    if (!sticky) {
      flash._t = setTimeout(function () { statusEl.style.opacity = '0'; }, 1500);
    }
  }

  function post(msg) {
    frame.contentWindow.postMessage(JSON.stringify(msg), drawioOrigin);
  }

  function loadXml(xml) {
    // Empty buffers would make the editor pop a dialog; show a blank page.
    if (!xml || !xml.trim()) {
      xml = '<mxGraphModel><root><mxCell id="0"/>' +
            '<mxCell id="1" parent="0"/></root></mxGraphModel>';
    }
    post({ action: 'load', xml: xml });
  }

  // The editor's XML export is an <mxfile> document. When the buffer holds
  // a bare <mxGraphModel>, unwrap it again so :DrawioLayout hands back the
  // same document type it was given. wantModel is decided when the layout
  // is *requested*, not when the export event arrives — by then another
  // buffer's push may have rewritten lastXml. Returns null when the
  // diagram payload is not plain XML (e.g. compressed), which Neovim
  // reports to the user.
  function unwrapForBuffer(xmlStr, wantModel) {
    try {
      var doc = new DOMParser().parseFromString(xmlStr, 'text/xml');
      var root = doc.documentElement;
      if (!root || root.nodeName === 'parsererror') return null;
      if (!wantModel) return xmlStr;
      if (root.nodeName === 'mxGraphModel') return xmlStr;
      var model = root.getElementsByTagName('mxGraphModel')[0];
      return model ? new XMLSerializer().serializeToString(model) : null;
    } catch (e) {
      return null;
    }
  }

  // --- messages from the embedded draw.io editor -------------------------
  window.addEventListener('message', function (e) {
    if (e.origin !== drawioOrigin || e.source !== frame.contentWindow ||
        typeof e.data !== 'string' || !e.data.length) {
      return;
    }
    var msg;
    try { msg = JSON.parse(e.data); } catch (_) { return; }

    if (msg.event === 'init') {
      ready = true;
      if (lastXml !== null) loadXml(lastXml);
      while (pendingExports.length) post(pendingExports.shift());
    } else if (msg.event === 'export') {
      // msg.message echoes back what we sent, including our token.
      if (msg.message && msg.message.kind === 'layout') {
        // XML export requested by :DrawioLayout; hand the laid-out
        // document back to Neovim.
        var xml = unwrapForBuffer(msg.xml || '', msg.message.wantModel);
        fetch('/layout-result' + auth, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(xml === null ? {
            error: 'unrecognized or compressed XML export',
            token: msg.message.token
          } : {
            xml: xml,
            token: msg.message.token
          })
        }).then(function (res) {
          flash(res.ok ? 'layout applied' : 'layout upload failed (' + res.status + ')');
        }).catch(function () {
          flash('layout upload failed — is Neovim still running?');
        });
        return;
      }
      // msg.data is a data URI ("data:image/png;base64,...").
      fetch('/export-result' + auth, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          png: msg.data,
          token: msg.message && msg.message.token
        })
      }).then(function (res) {
        flash(res.ok ? 'PNG exported' : 'export upload failed (' + res.status + ')');
      }).catch(function () {
        flash('export upload failed — is Neovim still running?');
      });
    }
  });

  // --- messages from Neovim (SSE) ----------------------------------------
  var es = new EventSource('/events' + auth);
  es.onopen = function () { flash('connected'); };
  es.onerror = function () { flash('disconnected — retrying...'); };
  es.onmessage = function (e) {
    var m;
    try { m = JSON.parse(e.data); } catch (_) { return; }

    if (m.type === 'load') {
      lastXml = m.xml;
      if (ready) loadXml(m.xml);
    } else if (m.type === 'export') {
      var req = {
        action: 'export',
        format: 'xmlpng',
        scale: m.scale || 1,
        message: { token: m.token }
      };
      if (ready) post(req); else pendingExports.push(req);
    } else if (m.type === 'layout') {
      // Run the layout, then export the result as XML; the export event
      // above routes it back through /layout-result via message.kind.
      // lastXml is the layout target here (Neovim pushes it right before
      // this message), so the document type is captured now.
      var reqs = [
        { action: 'layout', layouts: [{ layout: m.layout }] },
        { action: 'export', format: 'xml',
          message: { token: m.token, kind: 'layout',
                     wantModel: /^\s*<mxGraphModel/i.test(lastXml || '') } }
      ];
      if (ready) reqs.forEach(post); else pendingExports.push.apply(pendingExports, reqs);
    } else if (m.type === 'bye') {
      // Neovim stopped the preview; the port may differ next time, so
      // retrying this EventSource would never succeed.
      es.close();
      flash('preview stopped — run :DrawioPreview again', true);
    }
  };
})();
</script>
</body>
</html>
